{{ $datafile := .Get "datafile" }}
{{ $data := index .Site.Data $datafile }}

<div class="row" style="display: flex; flex-wrap: wrap; justify-content: center;">
{{ range $data }}
  <div class="col-xs-12" style="width: 100%;">
    <h3 class="text-center" style="margin-top: 40px; margin-bottom: 30px; font-weight: 800;">{{ .links_category }}</h3>
    <hr class="small">
  </div>
  {{ range .list }}
  <div class="col-xs-12 col-sm-6 col-md-4 col-lg-3" style="display: flex; justify-content: center; margin-bottom: 30px;">
    <div class="member-card">
      <div class="member-avatar">
        <img src="{{ .avatar }}" alt="{{ .name }}" loading="lazy">
      </div>
      <div class="member-info">
        <h4>{{ .name }}</h4>
        <p class="member-desc">{{ .description }}</p>
        <div class="member-links">
          {{ if .blog }}
          <a href="{{ .blog }}" target="_blank" rel="noopener" title="Blog"><i class="fas fa-link"></i></a>
          {{ end }}
          {{ if .github }}
          <a href="{{ .github }}" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i></a>
          {{ end }}
        </div>
      </div>
    </div>
  </div>
  {{ end }}
{{ end }}
</div>

<style>
.member-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 25px;
  border: 1px solid #e0e0e0;
  border-radius: 12px;
  background: #fff;
  box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  width: 100%;
  height: 100%;
  max-width: 300px; /* Prevent cards from getting too wide on single column */
}

.member-avatar img {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 15px;
  border: 3px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}

.member-info h4 {
  margin: 0 0 10px 0;
  font-weight: 700;
  font-size: 18px;
  color: #333;
}

.member-desc {
  font-size: 14px;
  color: #666;
  margin-bottom: 15px;
  line-height: 1.6;
  word-wrap: break-word;
}

.member-links a {
  margin: 0 8px;
  color: #888;
  font-size: 18px;
  transition: all 0.3s ease;
  display: inline-block;
}

.member-links a:hover {
  color: #008AFF;
  transform: rotate(360deg);
}

/* Dark mode support if the theme supports it via media query */
@media (prefers-color-scheme: dark) {
  .member-card {
    background: #2a2a2a;
    border-color: #444;
  }
  .member-info h4 {
    color: #eee;
  }
  .member-desc {
    color: #bbb;
  }
  .member-links a {
    color: #aaa;
  }
  .member-links a:hover {
    color: #50afff;
  }
  .member-avatar img {
    border-color: #333;
  }
}
</style>
