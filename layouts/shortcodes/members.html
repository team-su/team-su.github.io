<div class="members-board">
  {{ $datafile := .Get "datafile" }}
  {{ $data := index .Site.Data $datafile }}

  {{ range $data }}
    <section class="members-section">
      <div class="category-header">
        <h3 class="category-name">{{ .links_category }}</h3>
        <hr class="category-divider">
      </div>

      <div class="member-list">
        {{ range .list }}
          <article class="member-row">
            <div class="member-avatar">
              <img src="{{ .avatar }}" alt="{{ .name }}" loading="lazy">
            </div>

            <div class="member-body">
              <div class="member-top-line">
                <span class="name">{{ .name }}</span>
                <div class="meta-links">
                  {{ if .join }}
                    <span class="meta-item"><i class="fas fa-chess-knight"></i> Join: {{ .join }}</span>
                  {{ end }}

                  {{ if .blog }}
                    <a href="{{ .blog }}" target="_blank" rel="noopener noreferrer" class="meta-item link">
                      <i class="fas fa-link"></i> Blog
                    </a>
                  {{ end }}

                  {{ if .github }}
                    <a href="{{ .github }}" target="_blank" rel="noopener noreferrer" class="meta-item link">
                      <i class="fab fa-github"></i> GitHub
                    </a>
                  {{ end }}
                </div>
              </div>

              <div class="description">
                {{ .description }}
              </div>
            </div>
          </article>
        {{ end }}
      </div>
    </section>
  {{ end }}
</div>
