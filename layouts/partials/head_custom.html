<script>
  (function() {
    var theme = "dark";
    try {
      theme = localStorage.getItem("theme") || "dark";
    } catch (e) {
      theme = "dark";
    }
    document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
  })();
</script>
