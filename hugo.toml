baseurl = "https://su-team.cn/"
DefaultContentLanguage = "en"
title = "su-team"
theme = "beautifulhugo"
timeZone = "Asia/Shanghai"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 6
    ordered = false
    startLevel = 1
  [markup.highlight]
    lineNos = false
    codeFences = true
    guessSyntax = true
    style = "paraiso-light"
    noClasses = false

[Params]
  mainSections = ["post"]
  katex = true
  homeTitle = "su-team"
  homeEyebrow = "SU TEAM // BATTLE LOG"
  homeSubtitle = "Writeups, Records, and Field Notes"
  homeDescription = "Competition archives, deep-dive writeups, and long-term team memory from Team SU."
  logo = "img/SU.jpg"
  favicon = "img/SU.jpg"
  dateFormat = "January 2, 2006"
  commit = false
  rss = false
  selfHosted = true
  readingTime = true
  wordCount = true
  useHLJS = false
  socialShare = false
  delayDisqus = true
  showRelatedPosts = true
  articleEyebrow = "SU TEAM ARCHIVE"
  articleLead = "Writeups, reports, and battle notes from the team."
  footerTagline = "Built for team archives and competition writeups."
  footerSubline = "Minimal noise, high signal, and fast navigation."

[Params.author]
  name = "SUer"
  website = "https://su-team.cn"
  email = "suers_xctf@126.com"
  github = "team-su"
  ctftime = "https://ctftime.org/team/29641"

