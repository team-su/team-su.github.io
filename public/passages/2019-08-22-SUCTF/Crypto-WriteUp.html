<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SUCTF 2019 Crypto WriteUp</title>
    <style>
      :root {
        color-scheme: dark light;
        --bg: #0b1020;
        --card: rgba(16, 24, 40, 0.86);
        --text: #e5e7eb;
        --muted: #94a3b8;
        --line: rgba(148, 163, 184, 0.25);
        --accent: #60a5fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font: 16px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(96, 165, 250, 0.18), transparent 38%),
          linear-gradient(180deg, #0b1020 0%, #111827 100%);
        color: var(--text);
      }
      main {
        width: min(720px, 100%);
        padding: 32px 28px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 { margin: 0 0 12px; font-size: 28px; line-height: 1.2; }
      p { margin: 0 0 14px; color: var(--muted); }
      code {
        padding: 0.1em 0.35em;
        border-radius: 6px;
        background: rgba(148, 163, 184, 0.14);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .actions {
        margin-top: 22px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .button {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(96, 165, 250, 0.14);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SUCTF 2019 Crypto WriteUp</h1>
      <p>这篇 Crypto 外链原先指向旧站点，现已统一迁移到 <code>su-team.cn</code>。</p>
      <p>原始附件内容目前未收录到当前仓库，因此这里先保留一个站内入口，避免访问时跳回旧域名。</p>
      <div class="actions">
        <a class="button" href="/post/2019-suctf-official-writeup/">返回 SUCTF 2019 官方 Write up</a>
        <a class="button" href="/">返回首页</a>
      </div>
    </main>
  </body>
</html>
